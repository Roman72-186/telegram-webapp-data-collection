<!-- index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />

  <!-- Telegram Meta Tags -->
  <meta name="telegram-web-app" content="true" />
  <meta name="theme-color" content="#3390ec" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <title>Сбор данных - Telegram Web App</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root{
      --tg-theme-bg-color:#ffffff;
      --tg-theme-text-color:#000000;
      --tg-theme-hint-color:#999999;
      --tg-theme-link-color:#3390ec;
      --tg-theme-button-color:#3390ec;
      --tg-theme-button-text-color:#ffffff;
      --tg-theme-secondary-bg-color:#f1f1f1;
    }
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
      background:var(--tg-theme-bg-color);
      color:var(--tg-theme-text-color);
    }
    .tg-button{
      background:var(--tg-theme-button-color);
      color:var(--tg-theme-button-text-color);
      cursor:pointer;
      pointer-events:auto;
    }
    .tg-button:hover{ opacity:.9; }
    .tg-button:disabled{
      opacity:.5;
      cursor:not-allowed;
    }
    .tg-input{
      border:1px solid #e0e0e0;
      transition:all .2s;
    }
    .tg-input:focus{
      border-color:var(--tg-theme-button-color);
      outline:none;
      box-shadow:0 0 0 3px rgba(51,144,236,.1);
    }
    .tg-input.error{ border-color:#ff3333; }
    .error-message{
      color:#ff3333;
      font-size:.875rem;
      margin-top:.25rem;
      min-height:1.1em;
    }
    .success-message{ display:none; }
    .success-message.show{ display:block; }
    html{ scroll-behavior:smooth; }

    /* Ошибка отправки */
    .fatal-box{
      display:none;
      border:1px solid #ff3333;
      background:#fff5f5;
      border-radius:12px;
      padding:12px 14px;
      margin-top:14px;
      color:#b30000;
      font-size:.95rem;
    }
    .fatal-box.show{ display:block; }

    /* Превью фото */
    .photo-preview{
      width:100%;
      max-width:200px;
      border-radius:8px;
      margin-top:8px;
      display:none;
    }
    .photo-preview.show{
      display:block;
    }
    .photo-upload-area{
      border:2px dashed #e0e0e0;
      border-radius:12px;
      padding:16px;
      text-align:center;
      cursor:pointer;
      transition:all .2s;
    }
    .photo-upload-area:hover{
      border-color:var(--tg-theme-button-color);
      background:rgba(51,144,236,.03);
    }
    .photo-upload-area.has-photo{
      border-color:var(--tg-theme-button-color);
      border-style:solid;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col">
  <!-- Header -->
  <header class="bg-white shadow-sm py-6 px-4">
    <div class="max-w-2xl mx-auto">
      <h1 class="text-3xl font-bold text-gray-900 text-center mb-2">Замеры тела</h1>
      <p class="text-gray-600 text-center">Заполните ваши текущие замеры и загрузите фото прогресса</p>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 max-w-2xl mx-auto w-full px-4 py-8">
    <!-- Form -->
    <div id="dataForm" class="bg-white rounded-2xl shadow-lg p-6 md:p-8">
      <form id="form" class="space-y-6" novalidate>

        <!-- Замеры тела -->
        <h2 class="text-lg font-semibold text-gray-800">Замеры <span class="text-red-500">*</span></h2>

        <div class="grid grid-cols-2 gap-4">
          <!-- Вес -->
          <div class="col-span-2 sm:col-span-1">
            <label for="weight" class="block text-sm font-medium text-gray-700 mb-2">Вес (кг)</label>
            <input type="number" id="weight" name="weight" step="0.1" inputmode="decimal"
              class="tg-input w-full px-4 py-3 rounded-lg text-gray-900 placeholder-gray-400"
              placeholder="70.5" />
            <div id="weightError" class="error-message"></div>
          </div>

          <!-- Грудь -->
          <div class="col-span-2 sm:col-span-1">
            <label for="chest" class="block text-sm font-medium text-gray-700 mb-2">Грудь (см)</label>
            <input type="number" id="chest" name="chest" step="0.1" inputmode="decimal"
              class="tg-input w-full px-4 py-3 rounded-lg text-gray-900 placeholder-gray-400"
              placeholder="90" />
            <div id="chestError" class="error-message"></div>
          </div>

          <!-- Пупок -->
          <div class="col-span-2 sm:col-span-1">
            <label for="navel" class="block text-sm font-medium text-gray-700 mb-2">Пупок (см)</label>
            <input type="number" id="navel" name="navel" step="0.1" inputmode="decimal"
              class="tg-input w-full px-4 py-3 rounded-lg text-gray-900 placeholder-gray-400"
              placeholder="80" />
            <div id="navelError" class="error-message"></div>
          </div>

          <!-- Живот -->
          <div class="col-span-2 sm:col-span-1">
            <label for="stomach" class="block text-sm font-medium text-gray-700 mb-2">Живот (см)</label>
            <input type="number" id="stomach" name="stomach" step="0.1" inputmode="decimal"
              class="tg-input w-full px-4 py-3 rounded-lg text-gray-900 placeholder-gray-400"
              placeholder="85" />
            <div id="stomachError" class="error-message"></div>
          </div>

          <!-- Бёдра -->
          <div class="col-span-2 sm:col-span-1">
            <label for="hips" class="block text-sm font-medium text-gray-700 mb-2">Бёдра (см)</label>
            <input type="number" id="hips" name="hips" step="0.1" inputmode="decimal"
              class="tg-input w-full px-4 py-3 rounded-lg text-gray-900 placeholder-gray-400"
              placeholder="95" />
            <div id="hipsError" class="error-message"></div>
          </div>

          <!-- Ноги -->
          <div class="col-span-2 sm:col-span-1">
            <label for="legs" class="block text-sm font-medium text-gray-700 mb-2">Ноги (см)</label>
            <input type="number" id="legs" name="legs" step="0.1" inputmode="decimal"
              class="tg-input w-full px-4 py-3 rounded-lg text-gray-900 placeholder-gray-400"
              placeholder="55" />
            <div id="legsError" class="error-message"></div>
          </div>

          <!-- Руки -->
          <div class="col-span-2 sm:col-span-1">
            <label for="arms" class="block text-sm font-medium text-gray-700 mb-2">Руки (см)</label>
            <input type="number" id="arms" name="arms" step="0.1" inputmode="decimal"
              class="tg-input w-full px-4 py-3 rounded-lg text-gray-900 placeholder-gray-400"
              placeholder="30" />
            <div id="armsError" class="error-message"></div>
          </div>
        </div>

        <!-- Фото -->
        <h2 class="text-lg font-semibold text-gray-800 pt-4">Фото прогресса <span class="text-sm font-normal text-gray-500">(необязательно)</span></h2>

        <div class="space-y-4">
          <!-- Фото 1 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Фото 1</label>
            <div class="photo-upload-area" id="photoArea1" onclick="document.getElementById('photo1').click()">
              <p class="text-gray-400 text-sm">Нажмите для загрузки фото</p>
              <input type="file" id="photo1" accept="image/*" class="hidden" />
            </div>
            <img id="preview1" class="photo-preview" alt="Превью фото 1" />
          </div>

          <!-- Фото 2 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Фото 2</label>
            <div class="photo-upload-area" id="photoArea2" onclick="document.getElementById('photo2').click()">
              <p class="text-gray-400 text-sm">Нажмите для загрузки фото</p>
              <input type="file" id="photo2" accept="image/*" class="hidden" />
            </div>
            <img id="preview2" class="photo-preview" alt="Превью фото 2" />
          </div>

          <!-- Фото 3 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Фото 3</label>
            <div class="photo-upload-area" id="photoArea3" onclick="document.getElementById('photo3').click()">
              <p class="text-gray-400 text-sm">Нажмите для загрузки фото</p>
              <input type="file" id="photo3" accept="image/*" class="hidden" />
            </div>
            <img id="preview3" class="photo-preview" alt="Превью фото 3" />
          </div>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          id="submitBtn"
          class="tg-button w-full py-4 px-6 rounded-lg font-semibold text-lg transition-all duration-200 shadow-md hover:shadow-lg"
        >
          Отправить замеры
        </button>

        <!-- Loading -->
        <div id="loadingIndicator" class="hidden text-center py-4">
          <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
          <p class="mt-2 text-gray-600">Отправка данных...</p>
        </div>

        <!-- Fatal -->
        <div id="fatalBox" class="fatal-box"></div>
      </form>
    </div>

    <!-- Success -->
    <div id="successMessage" class="success-message bg-green-50 border border-green-200 rounded-2xl p-8 text-center mt-6">
      <div class="text-green-600 text-5xl mb-4">&#10003;</div>
      <h2 class="text-2xl font-bold text-gray-900 mb-2">Спасибо!</h2>
      <p class="text-gray-700 text-lg">Ваши замеры успешно отправлены</p>
    </div>
  </main>

  <!-- Footer -->
  <footer id="footer" class="bg-gray-50 border-t border-gray-200 mt-auto">
    <div class="max-w-4xl mx-auto px-4 py-6 text-center text-sm text-gray-500">
      <p>&copy; 2025 Все права защищены</p>
    </div>
  </footer>

  <script>
    // ===== DOM =====
    const form = document.getElementById('form');
    const dataForm = document.getElementById('dataForm');
    const successMessage = document.getElementById('successMessage');
    const submitBtn = document.getElementById('submitBtn');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const fatalBox = document.getElementById('fatalBox');

    // Поля замеров
    const measurementFields = ['weight', 'chest', 'navel', 'stomach', 'hips', 'legs', 'arms'];
    const measurementLabels = {
      weight: 'Вес', chest: 'Грудь', navel: 'Пупок',
      stomach: 'Живот', hips: 'Бёдра', legs: 'Ноги', arms: 'Руки'
    };

    // Хранилище сжатых фото (base64)
    const compressedPhotos = { photo1: null, photo2: null, photo3: null };

    // ===== Helpers =====
    function showFatal(message) {
      fatalBox.textContent = message || 'Ошибка';
      fatalBox.classList.add('show');
    }
    function hideFatal() {
      fatalBox.textContent = '';
      fatalBox.classList.remove('show');
    }

    function showError(input, errorEl, message) {
      input.classList.add('error');
      errorEl.textContent = message || '';
    }
    function hideError(input, errorEl) {
      input.classList.remove('error');
      errorEl.textContent = '';
    }

    // ===== Валидация замеров =====
    function validateMeasurement(fieldId) {
      const input = document.getElementById(fieldId);
      const errorEl = document.getElementById(fieldId + 'Error');
      const label = measurementLabels[fieldId];
      const val = parseFloat(input.value);

      if (!input.value.trim()) {
        showError(input, errorEl, `Поле "${label}" обязательно для заполнения`);
        return false;
      }
      if (isNaN(val) || val <= 0) {
        showError(input, errorEl, `Введите корректное значение для "${label}"`);
        return false;
      }
      hideError(input, errorEl);
      return true;
    }

    function validateAllMeasurements() {
      let allOk = true;
      for (const field of measurementFields) {
        if (!validateMeasurement(field)) allOk = false;
      }
      return allOk;
    }

    // ===== Real-time validation =====
    for (const field of measurementFields) {
      document.getElementById(field).addEventListener('blur', () => validateMeasurement(field));
    }

    // ===== Сжатие фото =====
    function compressImage(file, maxSize, quality) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = new Image();
          img.onload = function() {
            const canvas = document.createElement('canvas');
            let w = img.width;
            let h = img.height;

            // Уменьшаем до maxSize по большей стороне
            if (w > maxSize || h > maxSize) {
              if (w > h) {
                h = Math.round(h * maxSize / w);
                w = maxSize;
              } else {
                w = Math.round(w * maxSize / h);
                h = maxSize;
              }
            }

            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);

            // JPEG с указанным quality
            const dataUrl = canvas.toDataURL('image/jpeg', quality);
            resolve(dataUrl);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // ===== Обработка загрузки фото =====
    function setupPhotoInput(inputId, previewId, areaId, storageKey) {
      const input = document.getElementById(inputId);
      const preview = document.getElementById(previewId);
      const area = document.getElementById(areaId);

      input.addEventListener('change', async function() {
        const file = this.files[0];
        if (!file) return;

        // Сжимаем: max 800px, quality 0.6
        const compressed = await compressImage(file, 800, 0.6);
        compressedPhotos[storageKey] = compressed;

        // Показываем превью
        preview.src = compressed;
        preview.classList.add('show');
        area.classList.add('has-photo');
        area.querySelector('p').textContent = file.name;
      });
    }

    setupPhotoInput('photo1', 'preview1', 'photoArea1', 'photo1');
    setupPhotoInput('photo2', 'preview2', 'photoArea2', 'photo2');
    setupPhotoInput('photo3', 'preview3', 'photoArea3', 'photo3');

    // ===== Submit =====
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideFatal();

      if (!validateAllMeasurements()) return;

      // Telegram context
      const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

      const initData = tg ? (tg.initData || '') : '';
      const initDataUnsafe = tg ? (tg.initDataUnsafe || {}) : {};

      const telegram_id =
        tg && initDataUnsafe.user && typeof initDataUnsafe.user.id === 'number'
          ? initDataUnsafe.user.id
          : (window.DEV_TELEGRAM_ID || null);

      // Собираем замеры
      const measurements = {};
      for (const field of measurementFields) {
        measurements[field] = parseFloat(document.getElementById(field).value);
      }

      const payload = {
        ...measurements,
        photo_1: compressedPhotos.photo1 || null,
        photo_2: compressedPhotos.photo2 || null,
        photo_3: compressedPhotos.photo3 || null,
        telegram_id,
        telegram: {
          initData,
          user: initDataUnsafe.user || null
        }
      };

      if (tg) {
        tg.ready();
        tg.expand();
      }

      submitBtn.disabled = true;
      loadingIndicator.classList.remove('hidden');

      try {
        const res = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (!res.ok) {
          const t = await res.text().catch(() => '');
          throw new Error(t || `HTTP ${res.status}`);
        }

        dataForm.classList.add('hidden');
        successMessage.classList.add('show');

        if (tg) { try { tg.close(); } catch (_) {} }
      } catch (err) {
        showFatal(`Произошла ошибка при отправке данных: ${err && err.message ? err.message : 'неизвестная ошибка'}`);
      } finally {
        submitBtn.disabled = false;
        loadingIndicator.classList.add('hidden');
      }
    });

    // Telegram init
    if (window.Telegram && window.Telegram.WebApp) {
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();

      if (tg.themeParams) {
        document.documentElement.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#ffffff');
        document.documentElement.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color || '#000000');
        document.documentElement.style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#3390ec');
        document.documentElement.style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#ffffff');
      }
    }
  </script>
</body>
</html>
